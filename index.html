<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאגר תוצרים | קנבה</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-2: #232735;
            --border: #2d3141;
            --text: #e8eaed;
            --text-dim: #8b8fa3;
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.15);
            --accent-2: #00d4aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app {
            display: grid;
            grid-template-columns: 300px 1fr;
            grid-template-rows: 64px 1fr;
            min-height: 100vh;
        }

        /* ─── Header ─── */
        .header {
            grid-column: 1 / -1;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .logo h1 {
            font-size: 18px; font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .search-box { position: relative; width: 360px; }
        .search-box input {
            width: 100%; padding: 8px 16px 8px 40px;
            background: var(--surface-2); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text);
            font-family: 'Heebo', sans-serif; font-size: 14px; outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: var(--accent); }
        .search-box svg {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: var(--text-dim); width: 16px; height: 16px;
        }
        .header-stats { display: flex; gap: 16px; font-size: 13px; color: var(--text-dim); }
        .header-stats span { display: flex; align-items: center; gap: 4px; }
        .stat-num { color: var(--accent-2); font-weight: 600; }

        /* ─── Sidebar ─── */
        .sidebar {
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 12px 0;
            overflow-y: auto;
        }
        .sidebar-title {
            padding: 10px 20px 6px;
            font-size: 11px; text-transform: uppercase;
            letter-spacing: 1px; color: var(--text-dim); font-weight: 600;
        }

        /* Parent nav group */
        .nav-group { margin-bottom: 2px; }
        .nav-parent {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 20px; cursor: pointer;
            font-size: 14px; font-weight: 600; color: var(--text-dim);
            border-right: 3px solid transparent;
            transition: all 0.15s; user-select: none;
        }
        .nav-parent:hover { background: var(--surface-2); color: var(--text); }
        .nav-parent.active {
            background: var(--accent-glow); color: var(--text);
            border-right-color: var(--accent);
        }
        .nav-arrow {
            font-size: 10px; transition: transform 0.2s;
            width: 16px; text-align: center; flex-shrink: 0;
        }
        .nav-group.open .nav-arrow { transform: rotate(90deg); }
        .nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .nav-count {
            margin-right: auto;
            background: var(--surface-2); padding: 2px 8px;
            border-radius: 10px; font-size: 11px; font-weight: 500;
        }
        .nav-parent.active .nav-count,
        .nav-child.active .nav-count { background: var(--accent); color: white; }

        /* Child nav items */
        .nav-children {
            max-height: 0; overflow: hidden;
            transition: max-height 0.25s ease;
        }
        .nav-group.open .nav-children { max-height: 600px; }
        .nav-child {
            display: flex; align-items: center; gap: 8px;
            padding: 7px 20px 7px 44px; cursor: pointer;
            font-size: 13px; color: var(--text-dim);
            border-right: 3px solid transparent;
            transition: all 0.15s;
        }
        .nav-child:hover { background: var(--surface-2); color: var(--text); }
        .nav-child.active {
            background: var(--accent-glow); color: var(--text);
            border-right-color: var(--accent);
        }
        .nav-child-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--border); flex-shrink: 0;
        }
        .nav-child.active .nav-child-dot { background: var(--accent); }

        /* All button */
        .nav-all {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 20px; cursor: pointer;
            font-size: 14px; font-weight: 600; color: var(--text-dim);
            border-right: 3px solid transparent;
            transition: all 0.15s; margin-bottom: 8px;
        }
        .nav-all:hover { background: var(--surface-2); color: var(--text); }
        .nav-all.active {
            background: var(--accent-glow); color: var(--text);
            border-right-color: var(--accent);
        }

        /* ─── Main ─── */
        .main {
            padding: 24px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px;
        }
        .toolbar {
            display: flex; align-items: center; justify-content: space-between;
        }
        .category-header { display: flex; align-items: center; gap: 12px; }
        .category-header h2 { font-size: 22px; font-weight: 700; }
        .category-badge {
            font-size: 12px; padding: 4px 10px;
            border-radius: 6px; font-weight: 500;
        }
        .view-toggle {
            display: flex; gap: 4px;
            background: var(--surface); border-radius: 8px; padding: 4px;
        }
        .view-btn {
            padding: 6px 12px; border: none; background: transparent;
            color: var(--text-dim); cursor: pointer; border-radius: 6px;
            font-size: 13px; font-family: 'Heebo', sans-serif; transition: all 0.15s;
        }
        .view-btn.active { background: var(--accent); color: white; }

        /* ─── Subcategory section dividers ─── */
        .sub-section { margin-bottom: 8px; }
        .sub-section-title {
            font-size: 14px; font-weight: 600; color: var(--text-dim);
            padding: 6px 0; margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px;
        }
        .sub-section-title .sub-dot {
            width: 6px; height: 6px; border-radius: 50%;
        }

        /* ─── Grid ─── */
        .designs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 14px;
        }
        .design-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden; cursor: pointer;
            transition: all 0.2s; position: relative;
        }
        .design-card:hover {
            border-color: var(--accent); transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .card-thumb {
            width: 100%; height: 155px; background: var(--surface-2);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .card-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            gap: 8px; opacity: 0; transition: opacity 0.2s;
        }
        .design-card:hover .card-overlay { opacity: 1; }
        .overlay-btn {
            padding: 8px 16px; border: none; border-radius: 8px;
            font-family: 'Heebo', sans-serif; font-size: 13px;
            cursor: pointer; transition: transform 0.15s; font-weight: 500;
        }
        .overlay-btn:hover { transform: scale(1.05); }
        .btn-view { background: var(--accent); color: white; }
        .btn-edit { background: var(--accent-2); color: var(--bg); }
        .card-info { padding: 12px 14px; }
        .card-title {
            font-size: 13px; font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 6px;
        }
        .card-meta {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; color: var(--text-dim);
        }
        .card-type {
            padding: 2px 7px; border-radius: 4px;
            font-size: 10px; font-weight: 500;
        }

        /* ─── List ─── */
        .designs-list { display: none; flex-direction: column; gap: 4px; }
        .designs-list.active { display: flex; }
        .designs-grid.active { display: grid; }
        .designs-grid:not(.active) { display: none; }
        .list-item {
            display: grid;
            grid-template-columns: 24px 48px 1fr 100px 60px auto;
            align-items: center; gap: 12px; padding: 8px 14px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; cursor: pointer; transition: all 0.15s;
        }
        .list-item:hover { border-color: var(--accent); background: var(--surface-2); }
        .list-thumb {
            width: 48px; height: 34px; border-radius: 4px;
            overflow: hidden; background: var(--surface-2);
        }
        .list-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .list-title {
            font-size: 13px; font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .list-type { font-size: 11px; }
        .list-pages { font-size: 11px; color: var(--text-dim); text-align: center; }
        .list-actions { display: flex; gap: 6px; justify-content: flex-end; }
        .list-actions a {
            padding: 4px 10px; border-radius: 4px; font-size: 11px;
            text-decoration: none; font-weight: 500; transition: opacity 0.15s;
        }
        .list-actions a:hover { opacity: 0.8; }

        /* ─── Viewer ─── */
        .viewer-backdrop {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.75); z-index: 200; backdrop-filter: blur(6px);
            cursor: pointer;
        }
        .viewer-backdrop.active { display: flex; align-items: center; justify-content: center; }
        .viewer-modal {
            display: none; position: fixed; z-index: 300;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; overflow: hidden;
            width: 680px; max-width: 92vw;
            box-shadow: 0 24px 64px rgba(0,0,0,0.6);
            animation: modalIn 0.25s ease;
        }
        .viewer-modal.active { display: block; }
        @keyframes modalIn {
            from { transform: translate(-50%, -50%) scale(0.95); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .viewer-close {
            position: absolute; top: 12px; left: 12px; z-index: 10;
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(0,0,0,0.6); border: none; color: white;
            font-size: 16px; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .viewer-close:hover { background: rgba(0,0,0,0.8); }
        .viewer-img-wrap {
            width: 100%; max-height: 420px; overflow: hidden;
            background: var(--surface-2); display: flex;
            align-items: center; justify-content: center;
        }
        .viewer-img-wrap img {
            width: 100%; height: 100%; object-fit: contain;
            max-height: 420px;
        }
        .viewer-body { padding: 20px 24px; }
        .viewer-modal-title {
            font-size: 18px; font-weight: 700; margin-bottom: 6px;
        }
        .viewer-modal-sub {
            font-size: 13px; color: var(--text-dim); margin-bottom: 20px;
        }
        .viewer-buttons {
            display: flex; gap: 10px; flex-wrap: wrap;
        }
        .viewer-btn {
            flex: 1; min-width: 140px;
            padding: 12px 20px; border: none; border-radius: 10px;
            font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 600;
            cursor: pointer; text-decoration: none;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .viewer-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .btn-canva-edit {
            background: linear-gradient(135deg, #00c4cc, #7b2ff7);
            color: white;
        }
        .btn-canva-view {
            background: var(--accent); color: white;
        }
        .viewer-hint {
            margin-top: 14px; text-align: center;
            font-size: 12px; color: var(--text-dim);
        }

        /* ─── Card action buttons ─── */
        .card-actions {
            position: absolute; top: 6px; right: 6px; z-index: 5;
            display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s;
        }
        .design-card:hover .card-actions { opacity: 1; }
        .card-act-btn {
            width: 28px; height: 28px; border-radius: 50%;
            border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; transition: transform 0.15s;
            backdrop-filter: blur(4px);
        }
        .card-act-btn:hover { transform: scale(1.15); }
        .card-act-del { background: rgba(224,108,117,0.85); color: white; }
        .card-act-move { background: rgba(108,99,255,0.85); color: white; }

        .list-act-btn {
            padding: 4px 8px; border-radius: 4px; border: none;
            font-size: 11px; font-family: 'Heebo', sans-serif;
            cursor: pointer; font-weight: 500; transition: opacity 0.15s;
        }
        .list-act-btn:hover { opacity: 0.8; }

        /* ─── Catalog modal ─── */
        .catalog-modal {
            display: none; position: fixed; z-index: 400;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; width: 380px; max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            animation: modalIn 0.2s ease;
        }
        .catalog-modal.active { display: block; }
        .catalog-header {
            padding: 16px 20px; border-bottom: 1px solid var(--border);
            font-size: 16px; font-weight: 700;
            display: flex; align-items: center; justify-content: space-between;
        }
        .catalog-close {
            background: none; border: none; color: var(--text-dim);
            font-size: 18px; cursor: pointer;
        }
        .catalog-close:hover { color: var(--text); }
        .catalog-body { padding: 16px 20px; max-height: 400px; overflow-y: auto; }
        .catalog-item-name {
            font-size: 13px; color: var(--text-dim); margin-bottom: 12px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .catalog-group {
            margin-bottom: 6px;
        }
        .catalog-group-title {
            font-size: 13px; font-weight: 600; color: var(--text-dim);
            padding: 6px 10px; cursor: pointer; border-radius: 6px;
            display: flex; align-items: center; gap: 8px;
            transition: background 0.15s;
        }
        .catalog-group-title:hover { background: var(--surface-2); }
        .catalog-group-title .cg-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .catalog-sub {
            padding-right: 24px;
        }
        .catalog-option {
            padding: 7px 12px; font-size: 13px; cursor: pointer;
            border-radius: 6px; transition: background 0.15s;
            display: flex; align-items: center; gap: 6px;
        }
        .catalog-option:hover { background: var(--surface-2); }
        .catalog-option.current { background: var(--accent-glow); color: var(--accent); font-weight: 600; }
        .catalog-option .co-dot {
            width: 5px; height: 5px; border-radius: 50%; background: var(--border);
        }
        .catalog-option.current .co-dot { background: var(--accent); }

        /* ─── Delete confirm ─── */
        .confirm-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 500; background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 20px;
            display: none; align-items: center; gap: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            animation: modalIn 0.2s ease;
        }
        .confirm-bar.active { display: flex; }
        .confirm-bar span { font-size: 14px; }
        .confirm-btn {
            padding: 8px 18px; border: none; border-radius: 8px;
            font-family: 'Heebo', sans-serif; font-size: 13px;
            font-weight: 600; cursor: pointer; transition: opacity 0.15s;
        }
        .confirm-btn:hover { opacity: 0.85; }
        .confirm-del { background: #e06c75; color: white; }
        .confirm-cancel { background: var(--surface-2); color: var(--text); }

        /* ─── New folder ─── */
        .new-folder-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 20px; cursor: pointer;
            font-size: 13px; font-weight: 600; color: var(--accent-2);
            border: none; background: none; width: 100%;
            font-family: 'Heebo', sans-serif;
            transition: background 0.15s;
        }
        .new-folder-btn:hover { background: var(--surface-2); }
        .folder-input-row {
            display: flex; gap: 6px; padding: 6px 20px; align-items: center;
        }
        .folder-input-row input {
            flex: 1; padding: 7px 12px; background: var(--surface-2);
            border: 1px solid var(--border); border-radius: 6px;
            color: var(--text); font-family: 'Heebo', sans-serif; font-size: 13px;
            outline: none;
        }
        .folder-input-row input:focus { border-color: var(--accent); }
        .folder-input-row button {
            padding: 7px 14px; border: none; border-radius: 6px;
            font-family: 'Heebo', sans-serif; font-size: 12px;
            cursor: pointer; font-weight: 600;
        }
        .fi-ok { background: var(--accent-2); color: var(--bg); }
        .fi-cancel { background: var(--surface-2); color: var(--text-dim); }
        .catalog-new-folder {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; cursor: pointer; border-radius: 6px;
            font-size: 13px; font-weight: 600; color: var(--accent-2);
            transition: background 0.15s; border: 1px dashed var(--border);
            margin-top: 8px;
        }
        .catalog-new-folder:hover { background: var(--surface-2); }
        .catalog-input-row {
            display: flex; gap: 6px; margin-top: 8px; align-items: center;
        }
        .catalog-input-row input {
            flex: 1; padding: 7px 10px; background: var(--surface-2);
            border: 1px solid var(--border); border-radius: 6px;
            color: var(--text); font-family: 'Heebo', sans-serif; font-size: 13px;
            outline: none;
        }
        .catalog-input-row input:focus { border-color: var(--accent); }
        .catalog-input-row button {
            padding: 7px 12px; border: none; border-radius: 6px;
            font-family: 'Heebo', sans-serif; font-size: 12px;
            cursor: pointer; font-weight: 600;
        }
        .nav-folder-actions {
            display: flex; gap: 2px; margin-right: auto;
        }
        .nav-folder-del {
            background: none; border: none; color: var(--text-dim);
            font-size: 12px; cursor: pointer; padding: 2px 4px;
            border-radius: 4px; opacity: 0; transition: opacity 0.15s;
        }
        .nav-parent:hover .nav-folder-del { opacity: 1; }
        .nav-folder-del:hover { color: #e06c75; }
        .nav-child .nav-folder-del { opacity: 0; }
        .nav-child:hover .nav-folder-del { opacity: 1; }
        .nav-add-sub { cursor: pointer; }
        .nav-add-sub:hover { background: var(--surface-2); }

        /* ─── Multi-select ─── */
        .card-check {
            position: absolute; top: 6px; left: 6px; z-index: 6;
            width: 22px; height: 22px; border-radius: 5px;
            border: 2px solid rgba(255,255,255,0.5); background: rgba(0,0,0,0.3);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: white; transition: all 0.15s;
            opacity: 0;
        }
        .design-card:hover .card-check, .card-check.checked { opacity: 1; }
        .card-check.checked {
            background: var(--accent); border-color: var(--accent);
        }
        .list-check {
            width: 18px; height: 18px; border-radius: 4px;
            border: 2px solid var(--border); background: transparent;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: white; transition: all 0.15s; flex-shrink: 0;
        }
        .list-check.checked {
            background: var(--accent); border-color: var(--accent);
        }
        .bulk-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 450; background: var(--accent); border-radius: 12px;
            padding: 10px 20px; display: none; align-items: center; gap: 14px;
            box-shadow: 0 8px 32px rgba(108,99,255,0.4);
            animation: modalIn 0.2s ease; color: white;
        }
        .bulk-bar.active { display: flex; }
        .bulk-bar span { font-size: 14px; font-weight: 600; }
        .bulk-btn {
            padding: 7px 16px; border: none; border-radius: 8px;
            font-family: 'Heebo', sans-serif; font-size: 13px;
            font-weight: 600; cursor: pointer; transition: opacity 0.15s;
        }
        .bulk-btn:hover { opacity: 0.85; }
        .bulk-move { background: white; color: var(--accent); }
        .bulk-del { background: #e06c75; color: white; }
        .bulk-cancel { background: rgba(255,255,255,0.2); color: white; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        .mobile-menu-btn {
            display: none; background: none; border: none;
            color: var(--text); font-size: 20px; cursor: pointer;
        }
        @media (max-width: 768px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .sidebar.mobile-open {
                display: block; position: fixed;
                inset: 64px 0 0 auto; width: 300px; z-index: 150;
            }
            .viewer-panel { width: 100vw; }
            .search-box { width: 200px; }
            .header-stats { display: none; }
            .mobile-menu-btn { display: block; }

// Persistence — localStorage
// ═══════════════════════════════════════════════
(function loadUserEdits() {
    const deleted = JSON.parse(localStorage.getItem('mazagot_deleted') || '[]');
    const moved = JSON.parse(localStorage.getItem('mazagot_moved') || '{}');
    for (let i = designs.length - 1; i >= 0; i--) {
        if (deleted.includes(designs[i].id)) { designs.splice(i, 1); continue; }
        if (moved[designs[i].id]) {
            designs[i].group = moved[designs[i].id].group;
            designs[i].sub = moved[designs[i].id].sub;
        }
    }
})();

function saveDelete(id) {
    const arr = JSON.parse(localStorage.getItem('mazagot_deleted') || '[]');
    arr.push(id);
    localStorage.setItem('mazagot_deleted', JSON.stringify(arr));
}

function saveMove(id, group, sub) {
    const obj = JSON.parse(localStorage.getItem('mazagot_moved') || '{}');
    obj[id] = { group, sub };
    localStorage.setItem('mazagot_moved', JSON.stringify(obj));
}

// ─── Custom folders persistence ───
function loadCustomFolders() {
    const folders = JSON.parse(localStorage.getItem('mazagot_folders') || '[]');
    folders.forEach(f => {
        if (!tree.find(t => t.id === f.id)) {
            tree.push(f);
        }
    });
}
function saveCustomFolders() {
    const custom = tree.filter(t => t.custom);
    localStorage.setItem('mazagot_folders', JSON.stringify(custom));
}
function addCustomFolder(name) {
    if (!name || !name.trim()) return;
    name = name.trim();
    const id = 'custom_' + Date.now();
    const colors = ['#ff6b6b','#ffa94d','#51cf66','#339af0','#cc5de8','#20c997','#f06595','#fab005'];
    const color = colors[tree.filter(t=>t.custom).length % colors.length];
    const folder = { id, label: name, color, children: [], custom: true };
    tree.push(folder);
    saveCustomFolders();
    buildSidebar();
    return folder;
}
function addCustomSubfolder(parentId, name) {
    if (!name || !name.trim()) return;
    name = name.trim();
    const parent = tree.find(t => t.id === parentId);
    if (!parent) return;
    const subId = parentId + '.' + Date.now();
    parent.children.push({ id: subId, label: name });
    saveCustomFolders();
    buildSidebar();
    return subId;
}
function deleteCustomSubfolder(parentId, subId) {
    const parent = tree.find(t => t.id === parentId);
    if (!parent) return;
    const idx = parent.children.findIndex(c => c.id === subId);
    if (idx === -1) return;
    designs.forEach(d => {
        if (d.sub === subId) {
            d.group = parentId;
            d.sub = parentId;
            saveMove(d.id, parentId, parentId);
        }
    });
    parent.children.splice(idx, 1);
    saveCustomFolders();
    if (currentFilter === subId) currentFilter = parentId;
    buildSidebar();
    renderContent();
}
function deleteCustomFolder(folderId) {
    const idx = tree.findIndex(t => t.id === folderId);
    if (idx === -1) return;
    const folder = tree[idx];
    const subIds = (folder.children || []).map(c => c.id);
    designs.forEach(d => {
        if (d.group === folderId || subIds.includes(d.sub)) {
            d.group = 'other';
            d.sub = 'other';
            saveMove(d.id, 'other', 'other');
        }
    });
    tree.splice(idx, 1);
    saveCustomFolders();
    if (currentFilter === folderId || subIds.includes(currentFilter)) currentFilter = 'all';
    buildSidebar();
    renderContent();
}
loadCustomFolders();

// State
// ═══════════════════════════════════════════════
let currentFilter = 'all';   // 'all' | group id | sub id
let currentView = 'grid';

// ═══════════════════════════════════════════════
// Build sidebar
// ═══════════════════════════════════════════════
function buildSidebar() {
    const sb = document.getElementById('sidebar');
    const countByGroup = {}, countBySub = {};
    designs.forEach(d => {
        countByGroup[d.group] = (countByGroup[d.group] || 0) + 1;
        countBySub[d.sub] = (countBySub[d.sub] || 0) + 1;
    });

    let html = `<div class="nav-all active" data-filter="all" onclick="navigate('all',this)">
        <div class="nav-dot" style="background:linear-gradient(135deg,var(--accent),var(--accent-2))"></div>
        הכל <span class="nav-count">${designs.length}</span>
    </div>`;

    tree.forEach(g => {
        const isCustom = g.custom;
        html += `<div class="nav-group" data-group="${g.id}">
            <div class="nav-parent" data-filter="${g.id}" onclick="toggleGroup(this,'${g.id}')">
                <span class="nav-arrow">&#9654;</span>
                <div class="nav-dot" style="background:${g.color}"></div>
                ${g.label}
                ${isCustom ? `<button class="nav-folder-del" onclick="event.stopPropagation();deleteCustomFolder('${g.id}')" title="מחק תיקייה">&#10005;</button>` : ''}
                <span class="nav-count">${countByGroup[g.id] || 0}</span>
            </div>
            <div class="nav-children">`;
        (g.children || []).forEach(c => {
            html += `<div class="nav-child" data-filter="${c.id}" onclick="navigate('${c.id}',this)">
                <div class="nav-child-dot"></div>
                ${c.label}
                ${isCustom ? `<button class="nav-folder-del" onclick="event.stopPropagation();deleteCustomSubfolder('${g.id}','${c.id}')" title="מחק תת-נושא">&#10005;</button>` : ''}
                <span class="nav-count">${countBySub[c.id] || 0}</span>
            </div>`;
        });
        if (isCustom) {
            html += `<div class="nav-child nav-add-sub" onclick="event.stopPropagation();showSubfolderInput('${g.id}')">
                <div class="nav-child-dot" style="background:var(--accent-2)"></div>
                <span style="color:var(--accent-2)">+ תת-נושא</span>
            </div>`;
            html += `<div class="folder-input-row" id="subFolderRow_${g.id}" style="display:none">
                <input type="text" id="subFolderName_${g.id}" placeholder="שם תת-הנושא..." onkeydown="if(event.key==='Enter')submitSubfolder('${g.id}');if(event.key==='Escape')this.parentElement.style.display='none'">
                <button class="fi-ok" onclick="submitSubfolder('${g.id}')">&#10003;</button>
                <button class="fi-cancel" onclick="document.getElementById('subFolderRow_${g.id}').style.display='none'">&#10005;</button>
            </div>`;
        }
        html += `</div></div>`;
    });

    html += `<button class="new-folder-btn" onclick="showNewFolderInput()">&#43; תיקייה חדשה</button>`;
    html += `<div class="folder-input-row" id="newFolderRow" style="display:none">
        <input type="text" id="newFolderName" placeholder="שם התיקייה..." onkeydown="if(event.key==='Enter')submitNewFolder();if(event.key==='Escape')hideNewFolderInput()">
        <button class="fi-ok" onclick="submitNewFolder()">&#10003;</button>
        <button class="fi-cancel" onclick="hideNewFolderInput()">&#10005;</button>
    </div>`;

    sb.innerHTML = html;
}

function toggleGroup(el, groupId) {
    const grp = el.closest('.nav-group');
    const wasOpen = grp.classList.contains('open');

    if (!wasOpen) {
        grp.classList.add('open');
    }
    navigate(groupId, el);

    if (wasOpen && currentFilter === groupId) {
        grp.classList.remove('open');
    }
}

function navigate(filterId, el) {
    currentFilter = filterId;
    document.querySelectorAll('.nav-all,.nav-parent,.nav-child').forEach(n => n.classList.remove('active'));
    el.classList.add('active');

    const label = getFilterLabel(filterId);
    const color = getFilterColor(filterId);
    document.getElementById('currentTitle').textContent = label;
    const badge = document.getElementById('currentBadge');
    badge.textContent = label;
    badge.style.background = color + '22';
    badge.style.color = color;

    renderContent();
    document.getElementById('sidebar').classList.remove('mobile-open');
}

function getFilterLabel(id) {
    if (id === 'all') return 'כל התוצרים';
    for (const g of tree) {
        if (g.id === id) return g.label;
        for (const c of (g.children || [])) {
            if (c.id === id) return c.label;
        }
    }
    return id;
}

function getFilterColor(id) {
    if (id === 'all') return 'var(--accent)';
    for (const g of tree) {
        if (g.id === id) return g.color;
        for (const c of (g.children || [])) {
            if (c.id === id) return g.color;
        }
    }
    return 'var(--accent)';
}

function getGroupColor(groupId) {
    const g = tree.find(t => t.id === groupId);
    return g ? g.color : 'var(--accent)';
}

// ═══════════════════════════════════════════════
// Render
// ═══════════════════════════════════════════════
function getFiltered() {
    const search = document.getElementById('searchInput').value.trim().toLowerCase();
    let items = designs;
    if (currentFilter !== 'all') {
        items = items.filter(d => d.group === currentFilter || d.sub === currentFilter);
    }
    if (search) {
        items = items.filter(d => d.title.toLowerCase().includes(search));
    }
    return items;
}

function renderContent() {
    const items = getFiltered();
    const area = document.getElementById('contentArea');

    if (!items.length) {
        area.innerHTML = '<div class="empty-state"><p>לא נמצאו תוצרים</p></div>';
        return;
    }

    const isParentOrAll = currentFilter === 'all' || tree.some(g => g.id === currentFilter);

    if (isParentOrAll) {
        renderGrouped(items, area);
    } else {
        renderFlat(items, area);
    }
}

function renderGrouped(items, area) {
    const groups = {};
    items.forEach(d => {
        const subLabel = getFilterLabel(d.sub);
        if (!groups[d.sub]) groups[d.sub] = { label: subLabel, group: d.group, items: [] };
        groups[d.sub].items.push(d);
    });

    let html = '';
    for (const [subId, data] of Object.entries(groups)) {
        const color = getGroupColor(data.group);
        html += `<div class="sub-section">
            <div class="sub-section-title">
                <span class="sub-dot" style="background:${color}"></span>
                ${currentFilter === 'all' ? getFilterLabel(data.group) + ' / ' : ''}${data.label}
                <span style="color:var(--text-dim);font-size:12px;font-weight:400;margin-right:4px">(${data.items.length})</span>
            </div>`;
        if (currentView === 'grid') {
            html += `<div class="designs-grid active">${data.items.map(d => cardHTML(d)).join('')}</div>`;
        } else {
            html += `<div class="designs-list active">${data.items.map(d => listHTML(d)).join('')}</div>`;
        }
        html += `</div>`;
    }
    area.innerHTML = html;
}

function renderFlat(items, area) {
    if (currentView === 'grid') {
        area.innerHTML = `<div class="designs-grid active">${items.map(d => cardHTML(d)).join('')}</div>`;
    } else {
        area.innerHTML = `<div class="designs-list active">${items.map(d => listHTML(d)).join('')}</div>`;
    }
}

function cardHTML(d) {
    const color = getGroupColor(d.group);
    const checked = selectedIds.has(d.id);
    return `<div class="design-card" onclick="openViewer('${d.id}')">
        <div class="card-check${checked ? ' checked' : ''}" onclick="event.stopPropagation();toggleSelect('${d.id}',this)">${checked ? '&#10003;' : ''}</div>
        <div class="card-actions">
            <button class="card-act-btn card-act-move" onclick="event.stopPropagation();openCatalog('${d.id}')" title="העברה לקטגוריה">&#8644;</button>
            <button class="card-act-btn card-act-del" onclick="event.stopPropagation();confirmDelete('${d.id}')" title="מחיקה">&#10005;</button>
        </div>
        <div class="card-thumb">
            <img src="${d.thumb}" alt="${d.title}" loading="lazy" onerror="this.style.display='none'">
            <div class="card-overlay">
                <button class="overlay-btn btn-view" onclick="event.stopPropagation();openViewer('${d.id}')">צפייה</button>
                <button class="overlay-btn btn-edit" onclick="event.stopPropagation();window.open('${d.edit}','_blank')">עריכה</button>
            </div>
        </div>
        <div class="card-info">
            <div class="card-title" title="${d.title}">${d.title}</div>
            <div class="card-meta">
                <span class="card-type" style="background:${color}22;color:${color}">${getFilterLabel(d.sub)}</span>
                ${d.pages > 1 ? `<span>${d.pages} עמ'</span>` : ''}
            </div>
        </div>
    </div>`;
}

function listHTML(d) {
    const color = getGroupColor(d.group);
    const checked = selectedIds.has(d.id);
    return `<div class="list-item" onclick="openViewer('${d.id}')">
        <div class="list-check${checked ? ' checked' : ''}" onclick="event.stopPropagation();toggleSelect('${d.id}',this)">${checked ? '&#10003;' : ''}</div>
        <div class="list-thumb"><img src="${d.thumb}" alt="" loading="lazy" onerror="this.style.display='none'"></div>
        <span class="list-title" title="${d.title}">${d.title}</span>
        <span class="list-type card-type" style="background:${color}22;color:${color}">${getFilterLabel(d.sub)}</span>
        <span class="list-pages">${d.pages > 1 ? d.pages+" עמ'" : '-'}</span>
        <div class="list-actions">
            <button class="list-act-btn" style="background:var(--accent);color:white" onclick="event.stopPropagation();openCatalog('${d.id}')">&#8644; העברה</button>
            <button class="list-act-btn" style="background:#e06c75;color:white" onclick="event.stopPropagation();confirmDelete('${d.id}')">&#10005; מחיקה</button>
            <a href="${d.edit}" target="_blank" style="background:var(--accent-2);color:var(--bg)" onclick="event.stopPropagation()">עריכה</a>
        </div>
    </div>`;
}

function filterDesigns() { renderContent(); }

function setView(v, el) {
    currentView = v;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderContent();
}

function openViewer(id) {
    const d = designs.find(x => x.id === id);
    if (!d) return;
    document.getElementById('viewerTitle').textContent = d.title;
    document.getElementById('viewerSub').textContent =
        getFilterLabel(d.group) + ' / ' + getFilterLabel(d.sub) +
        (d.pages > 1 ? '  ·  ' + d.pages + ' עמודים' : '');
    document.getElementById('viewerImg').src = d.thumb;
    document.getElementById('viewerEditLink').href = d.edit;
    document.getElementById('viewerViewLink').href = d.view;
    document.getElementById('viewerModal').classList.add('active');
    document.getElementById('viewerBackdrop').classList.add('active');
}

function closeViewer() {
    document.getElementById('viewerModal').classList.remove('active');
    document.getElementById('viewerBackdrop').classList.remove('active');
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeViewer(); closeCatalog(); closeConfirm(); }
});

// ═══════════════════════════════════════════════
// New folder UI helpers
// ═══════════════════════════════════════════════
function showNewFolderInput() {
    const row = document.getElementById('newFolderRow');
    row.style.display = 'flex';
    document.getElementById('newFolderName').value = '';
    document.getElementById('newFolderName').focus();
}
function hideNewFolderInput() {
    document.getElementById('newFolderRow').style.display = 'none';
}
function submitNewFolder() {
    const name = document.getElementById('newFolderName').value;
    if (name.trim()) {
        addCustomFolder(name);
    }
    hideNewFolderInput();
}
function showSubfolderInput(parentId) {
    const row = document.getElementById('subFolderRow_' + parentId);
    if (!row) return;
    row.style.display = 'flex';
    const inp = document.getElementById('subFolderName_' + parentId);
    inp.value = '';
    inp.focus();
}
function submitSubfolder(parentId) {
    const inp = document.getElementById('subFolderName_' + parentId);
    if (!inp) return;
    const name = inp.value;
    if (name.trim()) {
        addCustomSubfolder(parentId, name);
    }
}

// ═══════════════════════════════════════════════
// Multi-select
// ═══════════════════════════════════════════════
const selectedIds = new Set();

function toggleSelect(id, el) {
    if (selectedIds.has(id)) {
        selectedIds.delete(id);
        el.classList.remove('checked');
        el.innerHTML = '';
    } else {
        selectedIds.add(id);
        el.classList.add('checked');
        el.innerHTML = '&#10003;';
    }
    updateBulkBar();
}

function updateBulkBar() {
    const bar = document.getElementById('bulkBar');
    if (selectedIds.size > 0) {
        bar.classList.add('active');
        document.getElementById('bulkCount').textContent = selectedIds.size + ' נבחרו';
    } else {
        bar.classList.remove('active');
    }
}

function clearSelection() {
    selectedIds.clear();
    document.querySelectorAll('.card-check.checked,.list-check.checked').forEach(el => {
        el.classList.remove('checked');
        el.innerHTML = '';
    });
    updateBulkBar();
}

function openBulkCatalog() {
    if (selectedIds.size === 0) return;
    catalogDesignId = null;
    const body = document.getElementById('catalogBody');
    let html = '<div class="catalog-item-name">&#128230; העברת ' + selectedIds.size + ' תוצרים</div>';

    tree.forEach(g => {
        const hasChildren = g.children && g.children.length > 0;
        const isCustom = g.custom;
        if (hasChildren || isCustom) {
            html += '<div class="catalog-group" data-gid="' + g.id + '">';
            html += '<div class="catalog-group-title" onclick="bulkMoveTo(\'' + g.id + '\',\'' + g.id + '\')"><span class="cg-dot" style="background:' + g.color + '"></span>' + g.label + '</div>';
            html += '<div class="catalog-sub">';
            (g.children || []).forEach(c => {
                html += '<div class="catalog-option" onclick="bulkMoveTo(\'' + g.id + '\',\'' + c.id + '\')">';
                html += '<span class="co-dot"></span>' + c.label + '</div>';
            });
            if (isCustom) {
                html += '<div class="catalog-option" style="color:var(--accent-2)" onclick="event.stopPropagation();showCatalogSubInput(\'' + g.id + '\',true)"><span class="co-dot" style="background:var(--accent-2)"></span>+ תת-נושא חדש</div>';
                html += '<div class="catalog-input-row" id="catalogSubRow_' + g.id + '" style="display:none">';
                html += '<input type="text" id="catalogSubName_' + g.id + '" placeholder="שם תת-הנושא..." onkeydown="if(event.key===\'Enter\')submitCatalogSub(\'' + g.id + '\');if(event.key===\'Escape\')this.parentElement.style.display=\'none\'">';
                html += '<button class="fi-ok" onclick="submitCatalogSub(\'' + g.id + '\')">&#10003;</button>';
                html += '</div>';
            }
            html += '</div></div>';
        } else {
            html += '<div class="catalog-option" onclick="bulkMoveTo(\'' + g.id + '\',\'' + g.id + '\')">';
            html += '<span class="cg-dot" style="background:' + g.color + ';width:8px;height:8px;border-radius:50%;flex-shrink:0"></span>' + g.label + '</div>';
        }
    });

    html += '<div class="catalog-new-folder" onclick="showCatalogNewFolder(true)">&#43; תיקייה חדשה</div>';
    html += '<div class="catalog-input-row" id="catalogNewFolderRow" style="display:none">';
    html += '<input type="text" id="catalogNewFolderName" placeholder="שם התיקייה..." onkeydown="if(event.key===\'Enter\')submitCatalogNewFolder(true);if(event.key===\'Escape\')document.getElementById(\'catalogNewFolderRow\').style.display=\'none\'">';
    html += '<button class="fi-ok" onclick="submitCatalogNewFolder(true)">&#10003;</button>';
    html += '</div>';

    body.innerHTML = html;
    document.getElementById('catalogModal').classList.add('active');
    document.getElementById('viewerBackdrop').classList.add('active');
}

function bulkMoveTo(group, sub) {
    selectedIds.forEach(id => {
        const d = designs.find(x => x.id === id);
        if (d) {
            d.group = group;
            d.sub = sub;
            saveMove(id, group, sub);
        }
    });
    clearSelection();
    closeCatalog();
    buildSidebar();
    renderContent();
}

function confirmBulkDelete() {
    if (selectedIds.size === 0) return;
    document.getElementById('confirmText').textContent = 'למחוק ' + selectedIds.size + ' תוצרים?';
    document.getElementById('confirmBar').classList.add('active');
    document.getElementById('confirmYes').onclick = function() { executeBulkDelete(); };
}

function executeBulkDelete() {
    selectedIds.forEach(id => {
        const idx = designs.findIndex(x => x.id === id);
        if (idx > -1) {
            saveDelete(id);
            designs.splice(idx, 1);
        }
    });
    clearSelection();
    closeConfirm();
    buildSidebar();
    document.getElementById('totalCount').textContent = designs.length;
    renderContent();
}

// ═══════════════════════════════════════════════
// Delete
// ═══════════════════════════════════════════════
let pendingDeleteId = null;

function confirmDelete(id) {
    const d = designs.find(x => x.id === id);
    if (!d) return;
    pendingDeleteId = id;
    document.getElementById('confirmText').textContent = 'למחוק את "' + d.title + '"?';
    document.getElementById('confirmBar').classList.add('active');
    document.getElementById('confirmYes').onclick = function() { executeDelete(); };
}

function executeDelete() {
    if (!pendingDeleteId) return;
    const idx = designs.findIndex(x => x.id === pendingDeleteId);
    if (idx > -1) {
        saveDelete(pendingDeleteId);
        designs.splice(idx, 1);
        closeConfirm();
        buildSidebar();
        document.getElementById('totalCount').textContent = designs.length;
        renderContent();
    }
}

function closeConfirm() {
    pendingDeleteId = null;
    document.getElementById('confirmBar').classList.remove('active');
}

// ═══════════════════════════════════════════════
// Catalog — move to category
// ═══════════════════════════════════════════════
let catalogDesignId = null;

function openCatalog(id) {
    const d = designs.find(x => x.id === id);
    if (!d) return;
    catalogDesignId = id;
    const body = document.getElementById('catalogBody');
    let html = '<div class="catalog-item-name">&#128196; ' + d.title + '</div>';

    tree.forEach(g => {
        const hasChildren = g.children && g.children.length > 0;
        const isCustom = g.custom;
        if (hasChildren || isCustom) {
            html += '<div class="catalog-group" data-gid="' + g.id + '">';
            const isGroupCurrent = d.group === g.id && d.sub === g.id;
            html += '<div class="catalog-group-title" onclick="moveTo(\'' + id + '\',\'' + g.id + '\',\'' + g.id + '\')"><span class="cg-dot" style="background:' + g.color + '"></span>' + g.label;
            if (isGroupCurrent) html += ' &#10003;';
            html += '</div>';
            html += '<div class="catalog-sub">';
            (g.children || []).forEach(c => {
                const isCurrent = d.sub === c.id;
                html += '<div class="catalog-option' + (isCurrent ? ' current' : '') + '" onclick="moveTo(\'' + id + '\',\'' + g.id + '\',\'' + c.id + '\')">';
                html += '<span class="co-dot"></span>' + c.label;
                if (isCurrent) html += ' &#10003;';
                html += '</div>';
            });
            if (isCustom) {
                html += '<div class="catalog-option" style="color:var(--accent-2)" onclick="event.stopPropagation();showCatalogSubInput(\'' + g.id + '\')"><span class="co-dot" style="background:var(--accent-2)"></span>+ תת-נושא חדש</div>';
                html += '<div class="catalog-input-row" id="catalogSubRow_' + g.id + '" style="display:none">';
                html += '<input type="text" id="catalogSubName_' + g.id + '" placeholder="שם תת-הנושא..." onkeydown="if(event.key===\'Enter\')submitCatalogSub(\'' + g.id + '\');if(event.key===\'Escape\')this.parentElement.style.display=\'none\'">';
                html += '<button class="fi-ok" onclick="submitCatalogSub(\'' + g.id + '\')">&#10003;</button>';
                html += '</div>';
            }
            html += '</div></div>';
        } else {
            const isCurrent = d.group === g.id;
            html += '<div class="catalog-option' + (isCurrent ? ' current' : '') + '" onclick="moveTo(\'' + id + '\',\'' + g.id + '\',\'' + g.id + '\')">';
            html += '<span class="cg-dot" style="background:' + g.color + ';width:8px;height:8px;border-radius:50%;flex-shrink:0"></span>' + g.label;
            if (isCurrent) html += ' &#10003;';
            html += '</div>';
        }
    });

    html += `<div class="catalog-new-folder" onclick="showCatalogNewFolder()">&#43; תיקייה חדשה</div>`;
    html += `<div class="catalog-input-row" id="catalogNewFolderRow" style="display:none">
        <input type="text" id="catalogNewFolderName" placeholder="שם התיקייה..." onkeydown="if(event.key==='Enter')submitCatalogNewFolder();if(event.key==='Escape')document.getElementById('catalogNewFolderRow').style.display='none'">
        <button class="fi-ok" onclick="submitCatalogNewFolder()">&#10003;</button>
    </div>`;

    body.innerHTML = html;
    document.getElementById('catalogModal').classList.add('active');
    document.getElementById('viewerBackdrop').classList.add('active');
}

function showCatalogNewFolder(bulk) {
    const row = document.getElementById('catalogNewFolderRow');
    row.style.display = 'flex';
    row.dataset.bulk = bulk ? '1' : '';
    document.getElementById('catalogNewFolderName').value = '';
    document.getElementById('catalogNewFolderName').focus();
}
function submitCatalogNewFolder(bulk) {
    const name = document.getElementById('catalogNewFolderName').value;
    if (!name.trim()) return;
    var folder = addCustomFolder(name);
    var isBulk = bulk || document.getElementById('catalogNewFolderRow').dataset.bulk === '1';
    if (isBulk && selectedIds.size > 0) {
        bulkMoveTo(folder.id, folder.id);
    } else if (catalogDesignId) {
        moveTo(catalogDesignId, folder.id, folder.id);
    }
}
function showCatalogSubInput(parentId) {
    const row = document.getElementById('catalogSubRow_' + parentId);
    if (!row) return;
    row.style.display = 'flex';
    var inp = document.getElementById('catalogSubName_' + parentId);
    inp.value = '';
    inp.focus();
}
function submitCatalogSub(parentId) {
    var inp = document.getElementById('catalogSubName_' + parentId);
    if (!inp || !inp.value.trim()) return;
    var subId = addCustomSubfolder(parentId, inp.value);
    if (subId && selectedIds.size > 0 && !catalogDesignId) {
        bulkMoveTo(parentId, subId);
    } else if (subId && catalogDesignId) {
        moveTo(catalogDesignId, parentId, subId);
    }
}

function moveTo(id, group, sub) {
    const d = designs.find(x => x.id === id);
    if (!d) return;
    d.group = group;
    d.sub = sub;
    saveMove(id, group, sub);
    closeCatalog();
    buildSidebar();
    renderContent();
}

function closeCatalog() {
    catalogDesignId = null;
    document.getElementById('catalogModal').classList.remove('active');
    if (!document.getElementById('viewerModal').classList.contains('active')) {
        document.getElementById('viewerBackdrop').classList.remove('active');
    }
}

// Init
buildSidebar();
document.getElementById('totalCount').textContent = designs.length;
renderContent();
</script>
</body>
</html>
